site_name: Panthera Insight
site_description: User guide and legal documents for the Panthera Insight mobile app.
site_author: Panthera International Asia Capital Pte. Ltd.
copyright: >
  &copy; 2026 Panthera International Asia Capital Pte. Ltd.

# Repo + edit links are intentionally omitted — this site is read-only.

theme:
  name: material
  language: en
  logo: assets/panthera-wordmark-gold.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: panthera-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: panthera-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji

nav:
  - Home: index.md
  - User Guide:
      - user-guide/index.md
      - Getting started: user-guide/getting-started.md
      - Signing in: user-guide/signing-in.md
      - Viewing your reports: user-guide/viewing-reports.md
      - Security & privacy: user-guide/security-and-privacy.md
      - Managing your account: user-guide/account-management.md
      - Troubleshooting: user-guide/troubleshooting.md
  - Legal:
      - legal/index.md
      - Privacy Notice: legal/privacy.md
      - Terms of Service: legal/terms.md
      - Delete your account: legal/delete-account.md

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:pantherainsight@gmail.com
      name: Contact the DPO
